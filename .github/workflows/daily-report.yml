name: daily-market-report

on:
  schedule:
    # 16:30 KST = 07:30 UTC, 월~금
    # cron-job.org 외부 스케줄러를 사용하면 이 cron은 비활성화 가능
    - cron: "30 7 * * 1-5"
  workflow_dispatch:
    inputs:
      force:
        description: "거래일 가드 무시하고 강제 실행"
        type: boolean
        default: false
      simulation_override:
        description: "시뮬레이션 모드 강제 지정"
        type: choice
        options: ["", "true", "false"]
        default: ""

permissions:
  contents: write

jobs:
  report:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Show run mode
        run: |
          SIM="${{ inputs.simulation_override || vars.SIMULATION_MODE || 'true' }}"
          [ "$SIM" = "true" ] && echo "🔵 시뮬레이션 모드 (API 비용 없음)" \
                              || echo "🟢 실전 모드 (Claude + KIS API 호출)"

      - name: Generate & deliver report
        env:
          SIMULATION_MODE:   ${{ inputs.simulation_override || vars.SIMULATION_MODE || 'true' }}
          # KIS OpenAPI (수급·섹터)
          KIS_APP_KEY:       ${{ secrets.KIS_APP_KEY }}
          KIS_APP_SECRET:    ${{ secrets.KIS_APP_SECRET }}
          # Claude API (실전 모드에서만 사용)
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          CLAUDE_MODEL:      ${{ vars.CLAUDE_MODEL || 'claude-sonnet-4-6' }}
          # 이메일
          EMAIL_ENABLED:     ${{ vars.EMAIL_ENABLED || 'false' }}
          SMTP_HOST:         ${{ vars.SMTP_HOST || 'smtp.gmail.com' }}
          SMTP_PORT:         ${{ vars.SMTP_PORT || '587' }}
          SMTP_USER:         ${{ secrets.SMTP_USER }}
          SMTP_PASS:         ${{ secrets.SMTP_PASS }}
          EMAIL_TO:          ${{ vars.EMAIL_TO }}
          # Slack
          SLACK_ENABLED:     ${{ vars.SLACK_ENABLED || 'false' }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: python main.py ${{ inputs.force && '--force' || '' }}

      - name: Upload report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: market-report-${{ github.run_number }}
          path: reports/
          if-no-files-found: ignore

      - name: Commit report to repo
        if: success()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add reports/ || true
          git diff --staged --quiet || git commit -m "report: $(date -u +%F)"
          git push || true
