# .github/workflows/us-market-signal.yml
#
# 매일 아침 6:00 KST (= UTC 21:00 전날) 자동 실행
# 기존 kr-market-report 레포의 Secrets 그대로 사용
#
# 필요 Secrets (기존 것 그대로):
#   TELEGRAM_BOT_TOKEN
#   TELEGRAM_CHAT_ID

name: 🇺🇸 US Market Signal

on:
  schedule:
    # 매일 21:00 UTC = 한국시간 06:00 KST
    - cron: "0 21 * * *"

  # 수동 실행 버튼 (테스트용)
  workflow_dispatch:

jobs:
  us-signal:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Python 설정
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 라이브러리 설치
        run: pip install yfinance requests

      - name: 미국 시장 신호 실행
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python us_market_signal.py
